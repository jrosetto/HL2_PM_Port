cl_detaildist "0"
cl_detailfade "0"
cl_smooth "0"
cl_threaded_bone_setup "1"

// ---------- Lighting Fix ----------
mat_monitorgamma "1.6"
mat_monitorgamma_tv_enabled "1"

// ===============================
// Performance Tweaks
// ===============================

// ---------- Frame pacing ----------
fps_max 30
engine_no_focus_sleep 1
mat_queue_mode 0

// ---------- LOD & distance ----------
r_lod 2
r_rootlod 2
r_propsmaxdist 700
r_drawdetailprops 0
r_staticprop_lod 2

// ---------- Lighting & shadows ----------
r_dynamic 0
r_shadows 0
r_shadowrendertotexture 0
r_flashlightrendertotexture 0
r_flashlightdepthtexture 0
r_renderoverlayfragment 0

// ---------- Materials & shaders ----------
mat_specular 0
mat_bumpmap 0
mat_phong 0
mat_reducefillrate 1
mat_disable_fancy_blending 1
mat_fastnobump 1

// ---------- Textures ----------
mat_picmip 2
mat_mipmaptextures 1
mat_forceaniso 0
mat_trilinear 0

// ---------- Water & skies ----------
r_waterforceexpensive 0
r_waterforcereflectentities 0
r_3dsky 0

// ---------- Physics & ragdolls ----------
g_ragdoll_fadespeed 0
g_ragdoll_lvfadespeed 0
g_ragdoll_maxcount 2
g_ragdoll_important_maxcount 1
phys_enableclientside 0

// ---------- Particles & effects ----------
cl_new_impact_effects 0
cl_particle_fallback_base 0
cl_particle_fallback_multiplier 3
violence_ablood 0
violence_hblood 0

// ---------- Sound (minor but helps) ----------
snd_mix_async 1
snd_pitchquality 0
snd_spatialize_roundrobin 1
snd_async_fullyasync 1