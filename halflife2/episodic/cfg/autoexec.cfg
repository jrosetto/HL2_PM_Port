// ---------- Lighting Fix ----------
gamma 2.9
brightness 1.7
mat_monitorgamma 1.0
mat_monitorgamma_tv_enabled "1"

// ---------- Performance Tweaks ----------
fps_max 30
engine_no_focus_sleep 1
mat_queue_mode 0
r_dynamic 0
mat_picmip 2
mat_mipmaptextures 1
mat_trilinear 0
mat_forceaniso 0
mat_bloom 0
mat_hdr_level 0
mat_colorcorrection 0
mat_specular 0
mat_bumpmap 0
mat_parallaxmap 0
mat_motion_blur_enabled 0
r_rootlod 2
mat_reducefillrate 1
mat_vsync 0
mat_forcehardwaresync 0

// ---------- Controller Enable ----------
joy_enable 1
joy_advanced 1
joy_name "Game controller"

// ---------- FACE BUTTONS ----------
bind "A_BUTTON" "+use"
bind "B_BUTTON" "+jump"
bind "X_BUTTON" "toggle_duck"
bind "Y_BUTTON" "+reload"

// ---------- TRIGGERS ----------
bind "R_TRIGGER" "impulse 100"
bind "L_TRIGGER" "impulse 100"

// ---------- BUMPERS ----------
bind "L_SHOULDER" "+attack2"
bind "R_SHOULDER" "+attack"

// ---------- D-PAD (Weapon Buckets) ----------
bind "DPAD_UP" "slot1"
bind "DPAD_RIGHT" "slot2"
bind "DPAD_DOWN" "slot3"
bind "DPAD_LEFT" "slot4"

// ---------- STICK CLICKS ----------
bind "STICK2" "+jump"
bind "STICK1" "+duck"

// ---------- MENUS ----------
bind "START" "pause"
bind "BACK" "save quick"

// ---------- Damage & AI safety reset ----------
sv_cheats 0

// Make sure damage is allowed
god 0
buddha 0

// Ensure AI responds and can take damage
ai_disabled 0

// Restore weapon damage behavior (loaded on map start)
sk_auto_reload_time 0

// ---------- Network / hit registration safety ----------
cl_interpolate 1
cl_interp 0.1
cl_smooth 0

// ---------- Performance-safe animation threading ----------
cl_threaded_bone_setup 1

// ---------- Detail props (optional, performance) ----------
hl2cl_detaildist 0
cl_detailfade 0